name: Apply post-65 SEO refresh

on:
  push:
    branches:
      - seo/post-65-metadata-refresh

permissions:
  contents: write

jobs:
  apply:
    if: github.event.head_commit.message != 'Refresh post-#65 SEO metadata and social preview'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: seo/post-65-metadata-refresh
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install image tooling
        run: python -m pip install --quiet pillow cairosvg fonttools

      - name: Update metadata, sitemap, and social preview
        run: |
          python <<'PY'
          from pathlib import Path
          import io
          import re
          import urllib.request

          from PIL import Image, ImageDraw, ImageFont
          import cairosvg
          from fontTools.ttLib import TTFont
          from fontTools.varLib.instancer import instantiateVariableFont

          ROOT = Path('.')
          IMAGE_URL = 'https://useasmade.com/social-preview.png'
          IMAGE_ALT = 'AsMade — Understand how the work was made.'

          pages = {
              'index.html': {
                  'title': 'AsMade — Understand how the work was made',
                  'description': 'AsMade creates a MADE Record for one specific work, bringing together what the person did, how AI was used, key decisions, available process information, and what remains unknown.',
                  'url': 'https://useasmade.com/',
              },
              'student.html': {
                  'title': 'AsMade for Students — Show what you did and how you used AI',
                  'description': 'A MADE Record brings together what you did in a specific assignment, how AI was used, the decisions you made, available process materials, and what remains unknown.',
                  'url': 'https://useasmade.com/student.html',
              },
              'artist.html': {
                  'title': 'AsMade for Creative Work — Show your role in work created with AI',
                  'description': 'A MADE Record brings together what the creator did, how AI was used, the decisions that shaped the work, available materials, and what remains unknown.',
                  'url': 'https://useasmade.com/artist.html',
              },
              'reviewer.html': {
                  'title': 'AsMade for Reviewers — Understand how the work was made',
                  'description': 'A MADE Record gives reviewers clearer context about what the person did, how AI was used, key decisions, available process information, and what remains unknown before they make their own judgment.',
                  'url': 'https://useasmade.com/reviewer.html',
              },
              'records.html': {
                  'title': 'MADE Records — AsMade',
                  'description': 'Explore public MADE Records and see who was involved, what they did, how AI was used, key decisions, available supporting materials, and important limits.',
                  'url': 'https://useasmade.com/records.html',
              },
              'sample-comic.html': {
                  'title': 'The Count of Monte Cristo — Page 050 | MADE Record | AsMade',
                  'description': 'Explore the MADE Record for The Count of Monte Cristo — Page 050: Creator direction, AI image generation, selection, final assembly, linked evidence, and important limits.',
                  'url': 'https://useasmade.com/sample-comic.html',
              },
              'sample-cv.html': {
                  'title': 'Professional CV | MADE Record | AsMade',
                  'description': "Explore the MADE Record for a bilingual professional CV: the Creator's role, how AI was used for wording and translation, final review, available evidence, and limits.",
                  'url': 'https://useasmade.com/sample-cv.html',
              },
              'about.html': {
                  'title': 'About AsMade — MADE Records and the current MVP',
                  'description': 'Learn what AsMade and MADE Records are, why the project exists, how the current MVP pilot works, who runs it, and the limits of the early MVP.',
                  'url': 'https://useasmade.com/about.html',
              },
              'contact/index.html': {
                  'title': 'Contact AsMade',
                  'description': 'Contact the AsMade team about the project, MVP pilot, privacy, or another brief question.',
                  'url': 'https://useasmade.com/contact',
              },
              'privacy.html': {
                  'title': 'Privacy Policy — AsMade',
                  'description': 'How AsMade handles public-site visits, contact messages, and MVP pilot applications.',
                  'url': 'https://useasmade.com/privacy.html',
              },
              'terms.html': {
                  'title': 'Terms of Use — AsMade',
                  'description': 'Terms for using the AsMade public information site and MVP pilot application.',
                  'url': 'https://useasmade.com/terms.html',
              },
              'pilot-notice.html': {
                  'title': 'MVP Pilot Application Notice — AsMade',
                  'description': 'What the current AsMade pilot application is, what it collects, who may apply, and what happens next.',
                  'url': 'https://useasmade.com/pilot-notice.html',
              },
          }

          def update_page(path_str, meta):
              path = ROOT / path_str
              text = path.read_text(encoding='utf-8')

              text, n_title = re.subn(
                  r'<title>.*?</title>',
                  f"<title>{meta['title']}</title>",
                  text,
                  count=1,
                  flags=re.S,
              )
              if n_title != 1:
                  raise RuntimeError(f'Expected one <title> in {path_str}')

              text, n_desc = re.subn(
                  r'<meta name="description" content="[^"]*"\s*/?>',
                  f'<meta name="description" content="{meta["description"]}" />',
                  text,
                  count=1,
              )
              if n_desc != 1:
                  raise RuntimeError(f'Expected one meta description in {path_str}')

              text = re.sub(r'^\s*<meta property="og:[^"]+"[^>]*>\s*\n?', '', text, flags=re.M)
              text = re.sub(r'^\s*<meta name="twitter:[^"]+"[^>]*>\s*\n?', '', text, flags=re.M)

              canonical_pattern = r'(^\s*<link rel="canonical" href="[^"]+"\s*/?>\s*$)'
              if not re.search(canonical_pattern, text, flags=re.M):
                  raise RuntimeError(f'Canonical not found in {path_str}')

              social = f'''\n  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="AsMade" />
  <meta property="og:title" content="{meta['title']}" />
  <meta property="og:description" content="{meta['description']}" />
  <meta property="og:url" content="{meta['url']}" />
  <meta property="og:image" content="{IMAGE_URL}" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="{IMAGE_ALT}" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{meta['title']}" />
  <meta name="twitter:description" content="{meta['description']}" />
  <meta name="twitter:image" content="{IMAGE_URL}" />
  <meta name="twitter:image:alt" content="{IMAGE_ALT}" />'''
              text = re.sub(canonical_pattern, r'\1' + social, text, count=1, flags=re.M)
              path.write_text(text, encoding='utf-8')

          for path_str, meta in pages.items():
              update_page(path_str, meta)

          sitemap = '''<?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
            <url><loc>https://useasmade.com/</loc></url>
            <url><loc>https://useasmade.com/student.html</loc></url>
            <url><loc>https://useasmade.com/artist.html</loc></url>
            <url><loc>https://useasmade.com/reviewer.html</loc></url>
            <url><loc>https://useasmade.com/records.html</loc></url>
            <url><loc>https://useasmade.com/sample-comic.html</loc></url>
            <url><loc>https://useasmade.com/sample-cv.html</loc></url>
            <url><loc>https://useasmade.com/about.html</loc></url>
            <url><loc>https://useasmade.com/privacy.html</loc></url>
            <url><loc>https://useasmade.com/terms.html</loc></url>
            <url><loc>https://useasmade.com/pilot-notice.html</loc></url>
            <url><loc>https://useasmade.com/contact</loc></url>
          </urlset>
          '''
          import textwrap
          (ROOT / 'sitemap.xml').write_text(textwrap.dedent(sitemap), encoding='utf-8')

          # Generate a stable 1200×630 PNG using the real AsMade wordmark outlines
          # and the same Onest type family used by the site.
          font_url = 'https://raw.githubusercontent.com/google/fonts/main/ofl/onest/Onest%5Bwght%5D.ttf'
          var_font_path = ROOT / 'onest-variable.ttf'
          urllib.request.urlretrieve(font_url, var_font_path)

          var_font = TTFont(var_font_path)
          for weight, name in [(400, 'onest-400.ttf'), (600, 'onest-600.ttf'), (700, 'onest-700.ttf')]:
              static_font = instantiateVariableFont(var_font, {'wght': weight}, inplace=False)
              static_font.save(ROOT / name)

          canvas = Image.new('RGB', (1200, 630), '#f5f4f0')
          draw = ImageDraw.Draw(canvas)
          ink = '#191918'
          muted = '#66645f'
          line = '#aaa79f'

          regular_30 = ImageFont.truetype(str(ROOT / 'onest-400.ttf'), 30)
          regular_31 = ImageFont.truetype(str(ROOT / 'onest-400.ttf'), 31)
          regular_24 = ImageFont.truetype(str(ROOT / 'onest-400.ttf'), 24)
          semibold_78 = ImageFont.truetype(str(ROOT / 'onest-600.ttf'), 78)
          bold_30 = ImageFont.truetype(str(ROOT / 'onest-700.ttf'), 30)

          wordmark_png = ROOT / 'wordmark-social-temp.png'
          cairosvg.svg2png(
              url=str(ROOT / 'asmade-wordmark.svg'),
              write_to=str(wordmark_png),
              output_width=194,
              output_height=38,
          )
          wordmark = Image.open(wordmark_png).convert('RGBA')
          canvas.paste(wordmark, (92, 62), wordmark)

          draw.line((326, 58, 326, 113), fill=line, width=1)
          draw.text((375, 63), 'MADE', font=bold_30, fill=ink)
          draw.text((485, 63), 'Record', font=regular_30, fill=muted)

          grid_x, grid_y, square, gap = 1084, 61, 8, 8
          for row in range(4):
              for col in range(4):
                  x = grid_x + col * (square + gap)
                  y = grid_y + row * (square + gap)
                  draw.rectangle((x, y, x + square, y + square), fill=ink)

          draw.text((92, 168), 'Understand how', font=semibold_78, fill=ink)
          draw.text((92, 254), 'the work was made.', font=semibold_78, fill=ink)
          draw.text((93, 388), 'See what the person did, how AI was used,', font=regular_31, fill=muted)
          draw.text((93, 433), 'and what remains unknown.', font=regular_31, fill=muted)
          draw.text((93, 522), 'Materials · Actions · Decisions · Evolution', font=regular_24, fill=muted)

          out = ROOT / 'social-preview.png'
          canvas.save(out, format='PNG', optimize=True)
          assert Image.open(out).size == (1200, 630)

          for temp in [var_font_path, ROOT / 'onest-400.ttf', ROOT / 'onest-600.ttf', ROOT / 'onest-700.ttf', wordmark_png]:
              temp.unlink(missing_ok=True)

          # Guardrails: no stale AI-assisted wording in SEO metadata, and no utility pages in sitemap.
          for path_str in pages:
              text = (ROOT / path_str).read_text(encoding='utf-8')
              head = text.split('</head>', 1)[0]
              if 'AI-assisted' in head:
                  raise RuntimeError(f'Stale AI-assisted wording remains in metadata for {path_str}')
              if 'social-preview.svg' in head:
                  raise RuntimeError(f'SVG social preview still referenced by {path_str}')

          sitemap_text = (ROOT / 'sitemap.xml').read_text(encoding='utf-8')
          for forbidden in ['evidence-viewer', 'creator.html', 'registry.html']:
              if forbidden in sitemap_text:
                  raise RuntimeError(f'Forbidden sitemap entry: {forbidden}')

          workflow = ROOT / '.github/workflows/seo-refresh.yml'
          workflow.unlink(missing_ok=True)
          PY

      - name: Commit scoped SEO changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Refresh post-#65 SEO metadata and social preview"
          git push origin HEAD:seo/post-65-metadata-refresh
