name: Issue 103 preview HTTP check

on:
  push:
    branches:
      - bugfix/issue-103-track-v4-audience-assets
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Fetch canonical V4 CSS URLs
        run: |
          node <<'NODE'
          const base = 'https://asmade-site-git-bugfix-issue-103-track-83bf82-archkirs-projects.vercel.app';
          const assets = ['/v4-audience-base.css','/v4-audience-pages.css','/v4-audience-polish.css'];
          (async () => {
            let failed = false;
            for (const asset of assets) {
              const r = await fetch(base + asset, { headers: { 'user-agent': 'AsMade-Issue-103-HTTP-Check/1.0' } });
              const text = await r.text();
              console.log(`${asset} status=${r.status} final=${r.url} type=${r.headers.get('content-type')} bytes=${Buffer.byteLength(text)} prefix=${JSON.stringify(text.slice(0,40))}`);
              if (r.status !== 200 || !(r.headers.get('content-type') || '').includes('text/css')) failed = true;
            }
            if (failed) process.exit(1);
          })().catch((e) => { console.error(String(e)); process.exit(1); });
          NODE
