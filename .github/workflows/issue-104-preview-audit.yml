name: Issue 104 full Preview audit

on:
  push:
    branches:
      - audit/issue-104-preview-verification
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright Chromium
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
      - name: Audit PR 28 Preview
        id: audit
        env:
          AUDIT_BASE: https://asmade-site-git-bugfix-issue-104-canon-8c293a-archkirs-projects.vercel.app
        run: |
          set +e
          node scripts/issue-104-preview-audit.mjs > issue-104-audit.log 2>&1
          status=$?
          cat issue-104-audit.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Post compact audit result
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '## Issue #104 Preview audit result'
            echo
            echo '```text'
            cat issue-104-audit.log
            echo '```'
          } > issue-104-comment.md
          gh pr comment 29 --body-file issue-104-comment.md
      - name: Fail job if audit failed
        if: steps.audit.outputs.status != '0'
        run: exit 1
