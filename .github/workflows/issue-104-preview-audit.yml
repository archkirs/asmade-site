name: Issue 104 final production audit

on:
  push:
    branches:
      - audit/issue-104-preview-verification
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright Chromium
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
      - name: Audit live production
        id: audit
        env:
          AUDIT_BASE: https://useasmade.com
        run: |
          set +e
          node scripts/issue-104-preview-audit.mjs > issue-104-production-audit.log 2>&1
          status=$?
          cat issue-104-production-audit.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Post compact production result
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '## Issue #104 final production audit result'
            echo
            echo 'Production commit under verification: `115e5bf21b6f425022eca0a396d93f01808b27cc`'
            echo
            echo '```text'
            cat issue-104-production-audit.log
            echo '```'
          } > issue-104-production-comment.md
          gh pr comment 29 --body-file issue-104-production-comment.md
      - name: Fail job if audit failed
        if: steps.audit.outputs.status != '0'
        run: exit 1
